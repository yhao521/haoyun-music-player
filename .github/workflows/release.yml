name: Release Build

on:
  push:
    tags:
      - "v*" # 当推送 v 开头的标签时触发，如 v0.5.0
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 需要写入权限来创建 Release

jobs:
  build-and-release:
    name: Build and Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        # macOS 使用 macos-latest (Apple Silicon)
        # Windows 使用 windows-latest
        # Linux 使用 ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以计算版本号

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Verify Wails installation
        run: wails3 doctor

      - name: Update build assets
        run: wails3 task common:update:build-assets
        if: runner.os == 'macOS'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          # 确保有 zip 命令
          which zip || brew install zip

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install NSIS (Nullsoft Scriptable Install System)
          Write-Host "Installing NSIS..."
          choco install nsis --no-progress -y
          
          # Wait for installation to complete
          Start-Sleep -Seconds 3
          
          # Refresh environment variables using multiple methods
          Write-Host "Refreshing environment variables..."
          
          # Method 1: Try refreshenv (Chocolatey helper)
          if (Get-Command refreshenv -ErrorAction SilentlyContinue) {
            try {
              refreshenv
              Write-Host "Used refreshenv to update environment"
            } catch {
              Write-Host "refreshenv failed: $_"
            }
          }
          
          # Method 2: Manually refresh PATH from registry
          $machinePath = [System.Environment]::GetEnvironmentVariable("Path","Machine")
          $userPath = [System.Environment]::GetEnvironmentVariable("Path","User")
          $env:Path = "$machinePath;$userPath"
          Write-Host "Manually refreshed PATH from registry"
          
          # Method 3: Search for makensis.exe and add its directory to PATH
          Write-Host "Searching for makensis.exe..."
          $nsisPaths = @(
            "C:\Program Files (x86)\NSIS",
            "C:\Program Files\NSIS",
            "$env:ProgramFiles\NSIS",
            "${env:ProgramFiles(x86)}\NSIS"
          )
          
          $makensisFound = $false
          foreach ($path in $nsisPaths) {
            $makensisExe = Join-Path $path "makensis.exe"
            if (Test-Path $makensisExe) {
              Write-Host "Found makensis at: $makensisExe"
              if ($env:Path -notlike "*$path*") {
                $env:Path = "$path;$env:Path"
                Write-Host "Added NSIS path to PATH: $path"
              }
              $makensisFound = $true
              break
            }
          }
          
          # Method 4: Deep search if not found in common locations
          if (-not $makensisFound) {
            Write-Host "Searching deeper for makensis.exe..."
            $foundFiles = Get-ChildItem -Path "C:\" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($foundFiles) {
              $nsisDir = Split-Path $foundFiles.FullName -Parent
              Write-Host "Found makensis at: $($foundFiles.FullName)"
              if ($env:Path -notlike "*$nsisDir*") {
                $env:Path = "$nsisDir;$env:Path"
                Write-Host "Added NSIS path to PATH: $nsisDir"
              }
              $makensisFound = $true
            }
          }
          
          # Final verification
          if (-not $makensisFound) {
            Write-Host "ERROR: makensis.exe not found anywhere on the system"
            Write-Host "Current PATH: $env:Path"
            exit 1
          }
          
          # Verify makensis is accessible
          Write-Host "Verifying makensis command..."
          $makensisCmd = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensisCmd) {
            Write-Host "SUCCESS: makensis is available at: $($makensisCmd.Source)"
            & makensis /VERSION
            Write-Host "NSIS installed and verified successfully"
          } else {
            Write-Host "WARNING: makensis not in PATH after all attempts"
            Write-Host "Current PATH: $env:Path"
            Write-Host "Attempting to use absolute path in subsequent steps..."
            # Export the absolute path for later use
            $makensisExe = Get-ChildItem -Path "C:\Program Files*" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($makensisExe) {
              echo "MAKENSIS_PATH=$($makensisExe.FullName)" >> $env:GITHUB_ENV
              Write-Host "Exported MAKENSIS_PATH: $($makensisExe.FullName)"
            }
          }
          
          Write-Host "Windows environment ready"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          
          # Install all required GTK3 and WebKit2GTK development libraries
          echo "Installing GTK3 and WebKit2GTK development libraries..."
          sudo apt-get install -y \
            libgtk-3-dev \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            zip \
            pkg-config || {
              echo "Primary installation failed, trying fallback packages..."
              sudo apt-get install -y \
                libgtk-3-dev \
                libasound2-dev \
                libwebkit2gtk-4.0-dev \
                zip \
                pkg-config || {
                  echo "ERROR: Failed to install required dependencies"
                  exit 1
                }
            }
          
          # Configure PKG_CONFIG_PATH for proper library detection
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          
          # Verify package installation and pkg-config paths
          echo "=== Verifying pkg-config ==="
          echo "PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          echo ""
          echo "=== Checking GTK3 ==="
          pkg-config --modversion gtk+-3.0 || echo "WARNING: gtk+-3.0 not found"
          echo ""
          echo "=== Checking WebKit2GTK ==="
          pkg-config --modversion webkit2gtk-4.1 || pkg-config --modversion webkit2gtk-4.0 || echo "WARNING: webkit2gtk not found"
          echo ""
          echo "=== Available .pc files ==="
          ls -la /usr/lib/x86_64-linux-gnu/pkgconfig/ | grep -E "(gtk|webkit)" || true
          echo ""
          echo "Linux dependencies installed and configured"

      - name: Build and Package (macos)
        if: runner.os == 'macOS'
        run: |
          echo "Starting package-all task..."
          task package-macos
        env:
          CGO_ENABLED: 1

      - name: Build and Package (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Starting package-all task..."
          task package-windows
        env:
          CGO_ENABLED: 1

      - name: Build and Package (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Starting package-linux task..."
          task package-linux
        env:
          CGO_ENABLED: 1

      - name: List built artifacts
        run: |
          echo "=== Built Artifacts ==="
          ls -lah bin/releases/ || dir bin\releases\
        shell: bash

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/releases/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual trigger)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: ${{ matrix.os }}-artifacts
          path: bin/releases/
          retention-days: 30
