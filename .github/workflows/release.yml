name: Release Build

on:
  push:
    tags:
      - "v*" # 当推送 v 开头的标签时触发，如 v0.5.0
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 需要写入权限来创建 Release

jobs:
  build-and-release:
    name: Build and Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        # macOS 使用 macos-latest (Apple Silicon)
        # Windows 使用 windows-latest
        # Linux 使用 ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以计算版本号

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Verify Wails installation
        run: wails3 doctor

      - name: Update build assets
        run: wails3 task common:update:build-assets
        if: runner.os == 'macOS'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          # 确保有 zip 命令
          which zip || brew install zip

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install NSIS (Nullsoft Scriptable Install System)
          Write-Host "Installing NSIS..."
          choco install nsis --no-progress -y
          
          # Wait for installation to complete
          Start-Sleep -Seconds 5
          
          # Search for makensis.exe in common locations
          Write-Host "Searching for makensis.exe..."
          $nsisPaths = @(
            "C:\Program Files (x86)\NSIS",
            "C:\Program Files\NSIS"
          )
          
          $makensisFound = $false
          $nsisDir = ""
          
          foreach ($path in $nsisPaths) {
            $makensisExe = Join-Path $path "makensis.exe"
            if (Test-Path $makensisExe) {
              Write-Host "Found makensis at: $makensisExe"
              $nsisDir = $path
              $makensisFound = $true
              break
            }
          }
          
          # Deep search if not found in common locations
          if (-not $makensisFound) {
            Write-Host "Deep searching for makensis.exe..."
            $foundFiles = Get-ChildItem -Path "C:\Program Files*" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($foundFiles) {
              $nsisDir = Split-Path $foundFiles.FullName -Parent
              Write-Host "Found makensis at: $($foundFiles.FullName)"
              $makensisFound = $true
            }
          }
          
          if (-not $makensisFound) {
            Write-Host "ERROR: makensis.exe not found!"
            exit 1
          }
          
          # Export NSIS directory to GITHUB_ENV for all subsequent steps
          Write-Host "Exporting environment variables..."
          Add-Content -Path $env:GITHUB_ENV -Value "NSIS_PATH=$nsisDir"
          Add-Content -Path $env:GITHUB_ENV -Value "MAKENSIS=$nsisDir\makensis.exe"
          
          # Add to PATH for all future steps
          Add-Content -Path $env:GITHUB_PATH -Value "$nsisDir"
          
          Write-Host "NSIS installed successfully at: $nsisDir"
          & "$nsisDir\makensis.exe" /VERSION
          Write-Host "Windows environment ready"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== Starting Linux dependency installation ==="
          echo "Ubuntu version: $(lsb_release -ds 2>/dev/null || cat /etc/os-release | grep PRETTY_NAME)"
          echo ""
          
          # Update package lists with retry logic
          echo "Updating package lists..."
          for i in {1..3}; do
            if sudo apt-get update; then
              echo "✓ Package lists updated successfully"
              break
            else
              echo "Attempt $i failed, retrying..."
              if [ $i -eq 3 ]; then
                echo "ERROR: Failed to update package lists after 3 attempts"
                exit 1
              fi
              sleep 5
            fi
          done
          
          # Install all required GTK3 and WebKit2GTK development libraries
          echo "Installing GTK3 and WebKit2GTK development libraries..."
          
          # First, check what's available in the repositories
          echo "Checking available webkit packages..."
          WEBKIT_41_AVAILABLE=$(apt-cache search libwebkit2gtk-4.1-dev | wc -l)
          WEBKIT_40_AVAILABLE=$(apt-cache search libwebkit2gtk-4.0-dev | wc -l)
          
          echo "  libwebkit2gtk-4.1-dev available: $WEBKIT_41_AVAILABLE"
          echo "  libwebkit2gtk-4.0-dev available: $WEBKIT_40_AVAILABLE"
          echo ""
          
          # Determine which version to install
          if [ "$WEBKIT_41_AVAILABLE" -gt 0 ]; then
            WEBKIT_PKG="libwebkit2gtk-4.1-dev"
            echo "Will install: $WEBKIT_PKG"
          elif [ "$WEBKIT_40_AVAILABLE" -gt 0 ]; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
            echo "Will install: $WEBKIT_PKG (fallback to 4.0)"
          else
            echo "ERROR: No webkit2gtk development package found in repositories!"
            echo "Available webkit packages:"
            apt-cache search libwebkit | grep dev || true
            exit 1
          fi
          echo ""
          
          # Try to install with the determined webkit version
          INSTALL_SUCCESS=false
          
          echo "Attempting to install dependencies..."
          if sudo apt-get install -y \
            libgtk-3-dev \
            libasound2-dev \
            "$WEBKIT_PKG" \
            zip \
            pkg-config 2>&1; then
            echo "✓ All dependencies installed successfully"
            INSTALL_SUCCESS=true
          else
            echo "✗ Batch installation failed, trying individual packages..."
            
            # Install core packages first
            echo "Installing core dependencies..."
            sudo apt-get install -y libgtk-3-dev || {
              echo "ERROR: Failed to install libgtk-3-dev"
              exit 1
            }
            
            sudo apt-get install -y libasound2-dev || {
              echo "ERROR: Failed to install libasound2-dev"
              exit 1
            }
            
            # Try webkit
            echo "Installing webkit..."
            if sudo apt-get install -y "$WEBKIT_PKG"; then
              echo "✓ Installed $WEBKIT_PKG"
            else
              echo "ERROR: Failed to install $WEBKIT_PKG"
              echo "Trying alternative webkit packages..."
              
              # Try the other version as last resort
              if [ "$WEBKIT_PKG" = "libwebkit2gtk-4.1-dev" ]; then
                ALTERNATIVE="libwebkit2gtk-4.0-dev"
              else
                ALTERNATIVE="libwebkit2gtk-4.1-dev"
              fi
              
              if sudo apt-get install -y "$ALTERNATIVE"; then
                echo "✓ Installed alternative: $ALTERNATIVE"
                WEBKIT_PKG="$ALTERNATIVE"
              else
                echo "ERROR: Cannot install any webkit2gtk package"
                exit 1
              fi
            fi
            
            # Install remaining tools
            sudo apt-get install -y zip pkg-config || true
            INSTALL_SUCCESS=true
          fi
          
          if [ "$INSTALL_SUCCESS" = false ]; then
            echo "ERROR: Installation failed!"
            exit 1
          fi
          
          # Configure PKG_CONFIG_PATH for proper library detection
          echo ""
          echo "=== Configuring PKG_CONFIG_PATH ==="
          
          # Find all GTK and WebKit .pc files on the system
          echo "Searching for GTK and WebKit .pc files..."
          GTK_PC_FILES=$(find /usr -name "gtk+-3.0.pc" 2>/dev/null)
          WEBKIT_PC_FILES=$(find /usr -name "webkit*.pc" 2>/dev/null)
          
          if [ -n "$GTK_PC_FILES" ]; then
            echo "Found GTK .pc files:"
            echo "$GTK_PC_FILES"
          else
            echo "WARNING: No gtk+-3.0.pc file found!"
          fi
          
          if [ -n "$WEBKIT_PC_FILES" ]; then
            echo "Found WebKit .pc files:"
            echo "$WEBKIT_PC_FILES"
          else
            echo "WARNING: No webkit .pc files found!"
          fi
          echo ""
          
          # Build comprehensive PKG_CONFIG_PATH
          PKG_CONFIG_DIRS=""
          
          # Check common pkgconfig directories
          for dir in "/usr/lib/x86_64-linux-gnu/pkgconfig" "/usr/share/pkgconfig" "/usr/lib/pkgconfig" "/usr/local/lib/pkgconfig"; do
            if [ -d "$dir" ]; then
              # Check if this directory contains GTK or WebKit .pc files
              HAS_REQUIRED_FILES=false
              if ls "$dir"/gtk+-3.0.pc 1>/dev/null 2>&1 || ls "$dir"/webkit*.pc 1>/dev/null 2>&1; then
                HAS_REQUIRED_FILES=true
              fi
              
              if [ "$HAS_REQUIRED_FILES" = true ]; then
                echo "✓ Found required .pc files in: $dir"
                if [ -n "$PKG_CONFIG_DIRS" ]; then
                  PKG_CONFIG_DIRS="$PKG_CONFIG_DIRS:$dir"
                else
                  PKG_CONFIG_DIRS="$dir"
                fi
              fi
            fi
          done
          
          # Add any additional directories where .pc files were found
          if [ -n "$GTK_PC_FILES" ]; then
            GTK_DIR=$(dirname "$(echo "$GTK_PC_FILES" | head -1)")
            if [[ ":$PKG_CONFIG_DIRS:" != *":$GTK_DIR:"* ]]; then
              echo "Adding GTK directory: $GTK_DIR"
              PKG_CONFIG_DIRS="$PKG_CONFIG_DIRS:$GTK_DIR"
            fi
          fi
          
          if [ -n "$WEBKIT_PC_FILES" ]; then
            WEBKIT_DIR=$(dirname "$(echo "$WEBKIT_PC_FILES" | head -1)")
            if [[ ":$PKG_CONFIG_DIRS:" != *":$WEBKIT_DIR:"* ]]; then
              echo "Adding WebKit directory: $WEBKIT_DIR"
              PKG_CONFIG_DIRS="$PKG_CONFIG_DIRS:$WEBKIT_DIR"
            fi
          fi
          
          # Ensure PKG_CONFIG_DIRS is not empty
          if [ -z "$PKG_CONFIG_DIRS" ]; then
            echo "WARNING: No .pc files found in standard locations!"
            echo "Setting default PKG_CONFIG_PATH..."
            PKG_CONFIG_DIRS="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          fi
          
          # Export to GITHUB_ENV for all subsequent steps
          export PKG_CONFIG_PATH="$PKG_CONFIG_DIRS${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo ""
          echo "Final PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          
          # Verify package installation and pkg-config paths
          echo ""
          echo "=== Verifying pkg-config ==="
          echo "Current PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          echo ""
          
          # Check GTK3
          echo "=== Checking GTK3 ==="
          if GTK_VERSION=$(pkg-config --modversion gtk+-3.0 2>&1); then
            echo "✓ GTK3 found (version: $GTK_VERSION)"
          else
            echo "✗ ERROR: gtk+-3.0 not found!"
            echo "Error details: $GTK_VERSION"
            echo ""
            echo "Debugging information:"
            echo "1. Available .pc files in PKG_CONFIG_PATH:"
            for dir in $(echo "$PKG_CONFIG_PATH" | tr ':' '\n'); do
              if [ -d "$dir" ]; then
                echo "   Directory: $dir"
                ls -la "$dir"/*.pc 2>/dev/null | grep -E "(gtk|webkit)" || echo "     (no relevant .pc files)"
              fi
            done
            echo ""
            echo "2. pkg-config default search path:"
            pkg-config --variable pc_path pkg-config 2>/dev/null || echo "   (unable to retrieve)"
            exit 1
          fi
          echo ""
          
          # Check WebKit2GTK
          echo "=== Checking WebKit2GTK ==="
          WEBKIT_FOUND=false
          
          if WEBKIT_VERSION=$(pkg-config --modversion webkit2gtk-4.1 2>&1); then
            echo "✓ WebKit2GTK 4.1 found (version: $WEBKIT_VERSION)"
            WEBKIT_FOUND=true
          elif WEBKIT_VERSION=$(pkg-config --modversion webkit2gtk-4.0 2>&1); then
            echo "✓ WebKit2GTK 4.0 found (version: $WEBKIT_VERSION)"
            WEBKIT_FOUND=true
          else
            echo "✗ ERROR: Neither webkit2gtk-4.1 nor webkit2gtk-4.0 found!"
            echo "Error details: $WEBKIT_VERSION"
            echo ""
            echo "Debugging information:"
            echo "1. Available .pc files in PKG_CONFIG_PATH:"
            for dir in $(echo "$PKG_CONFIG_PATH" | tr ':' '\n'); do
              if [ -d "$dir" ]; then
                echo "   Directory: $dir"
                ls -la "$dir"/*.pc 2>/dev/null | grep -E "(gtk|webkit)" || echo "     (no relevant .pc files)"
              fi
            done
            echo ""
            echo "2. pkg-config default search path:"
            pkg-config --variable pc_path pkg-config 2>/dev/null || echo "   (unable to retrieve)"
            exit 1
          fi
          echo ""
          echo "=== Linux dependencies installed and configured successfully ==="

      - name: Build and Package (macos)
        if: runner.os == 'macOS'
        run: |
          echo "Starting package-all task..."
          task package-macos
        env:
          CGO_ENABLED: 1

      - name: Build and Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Starting package-windows task..."
          Write-Host "NSIS_PATH is: $env:NSIS_PATH"
          Write-Host "PATH includes: $env:Path"
          
          # Verify makensis is accessible
          $makensisCmd = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensisCmd) {
            Write-Host "SUCCESS: makensis found at: $($makensisCmd.Source)"
            & makensis /VERSION
          } else {
            Write-Host "WARNING: makensis not found in PATH"
            Write-Host "Available NSIS paths:"
            Get-ChildItem -Path "C:\Program Files*" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }
          
          # Note: In GitHub Actions windows-latest, we typically only build for the current architecture
          # Universal packaging requires both ARM64 and AMD64 installers
          # The Taskfile will handle missing files gracefully
          task package-windows
        env:
          CGO_ENABLED: 1

      - name: Build and Package (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== Starting package-linux task ==="
          echo "Current PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
          echo ""
          
          # Pre-build verification with detailed diagnostics
          echo "=== Pre-build dependency verification ==="
          
          # Check if pkg-config is available
          if ! command -v pkg-config &> /dev/null; then
            echo "ERROR: pkg-config not found!"
            exit 1
          fi
          echo "✓ pkg-config found at: $(which pkg-config)"
          echo ""
          
          # Show all .pc files in the system for debugging
          echo "=== Searching for GTK and WebKit .pc files ==="
          ALL_GTK_PC=$(find /usr -name "gtk+-3.0.pc" 2>/dev/null || true)
          ALL_WEBKIT_PC=$(find /usr -name "webkit*.pc" 2>/dev/null || true)
          
          if [ -n "$ALL_GTK_PC" ]; then
            echo "Found gtk+-3.0.pc files:"
            echo "$ALL_GTK_PC"
          else
            echo "✗ WARNING: No gtk+-3.0.pc found anywhere on the system!"
          fi
          
          if [ -n "$ALL_WEBKIT_PC" ]; then
            echo "Found webkit .pc files:"
            echo "$ALL_WEBKIT_PC"
          else
            echo "✗ WARNING: No webkit*.pc found anywhere on the system!"
          fi
          echo ""
          
          # Show what's installed
          echo "=== Checking installed packages ==="
          dpkg -l | grep -E "(libgtk-3-dev|libwebkit2gtk)" || echo "No GTK/WebKit dev packages found!"
          echo ""
          
          # Verify GTK3
          echo "Checking GTK3 via pkg-config..."
          if GTK_VERSION=$(pkg-config --modversion gtk+-3.0 2>&1); then
            echo "✓ GTK3 version: $GTK_VERSION"
          else
            echo "✗ ERROR: Cannot find gtk+-3.0 via pkg-config"
            echo "Error details: $GTK_VERSION"
            echo ""
            echo "Debugging information:"
            echo "1. Current PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
            echo "2. Directories in PKG_CONFIG_PATH:"
            for dir in $(echo "$PKG_CONFIG_PATH" | tr ':' '\n'); do
              if [ -d "$dir" ]; then
                echo "   ✓ Directory exists: $dir"
                ls "$dir"/gtk+-3.0.pc 2>/dev/null && echo "     → Contains gtk+-3.0.pc" || echo "     → No gtk+-3.0.pc"
              else
                echo "   ✗ Directory does NOT exist: $dir"
              fi
            done
            echo ""
            echo "3. pkg-config default search path:"
            pkg-config --variable pc_path pkg-config 2>/dev/null || echo "   (unable to retrieve)"
            echo ""
            echo "SUGGESTION: The .pc files may not be installed or are in a non-standard location."
            echo "Try reinstalling libgtk-3-dev: sudo apt-get install --reinstall libgtk-3-dev"
            exit 1
          fi
          
          # Verify WebKit2GTK
          echo ""
          echo "Checking WebKit2GTK via pkg-config..."
          WEBKIT_FOUND=false
          
          if WEBKIT_VERSION=$(pkg-config --modversion webkit2gtk-4.1 2>&1); then
            echo "✓ WebKit2GTK 4.1 version: $WEBKIT_VERSION"
            WEBKIT_FOUND=true
          elif WEBKIT_VERSION=$(pkg-config --modversion webkit2gtk-4.0 2>&1); then
            echo "✓ WebKit2GTK 4.0 version: $WEBKIT_VERSION"
            WEBKIT_FOUND=true
          else
            echo "✗ ERROR: Cannot find webkit2gtk via pkg-config"
            echo "Error details: $WEBKIT_VERSION"
            echo ""
            echo "Debugging information:"
            echo "1. Current PKG_CONFIG_PATH: $PKG_CONFIG_PATH"
            echo "2. Directories in PKG_CONFIG_PATH:"
            for dir in $(echo "$PKG_CONFIG_PATH" | tr ':' '\n'); do
              if [ -d "$dir" ]; then
                echo "   ✓ Directory exists: $dir"
                ls "$dir"/webkit*.pc 2>/dev/null && echo "     → Contains webkit .pc files" || echo "     → No webkit .pc files"
              else
                echo "   ✗ Directory does NOT exist: $dir"
              fi
            done
            echo ""
            echo "3. pkg-config default search path:"
            pkg-config --variable pc_path pkg-config 2>/dev/null || echo "   (unable to retrieve)"
            echo ""
            echo "SUGGESTION: The .pc files may not be installed or are in a non-standard location."
            echo "Try reinstalling the webkit package: sudo apt-get install --reinstall libwebkit2gtk-4.1-dev"
            exit 1
          fi
          
          echo ""
          echo "✓ All dependencies verified successfully"
          echo ""
          
          # Export PKG_CONFIG_PATH to ensure it's available for the task command
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH"
          echo "Exporting PKG_CONFIG_PATH for task execution: $PKG_CONFIG_PATH"
          
          # Run the packaging task with explicit environment variables
          echo "=== Starting packaging ==="
          env PKG_CONFIG_PATH="$PKG_CONFIG_PATH" CGO_ENABLED=1 task package-linux
      - name: List built artifacts
        run: |
          echo "=== Built Artifacts ==="
          ls -lah bin/releases/ || dir bin\releases\
        shell: bash

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/releases/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual trigger)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: ${{ matrix.os }}-artifacts
          path: bin/releases/
          retention-days: 30
