name: Release Build

on:
  push:
    tags:
      - "v*" # 当推送 v 开头的标签时触发，如 v0.5.0
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 需要写入权限来创建 Release

jobs:
  build-and-release:
    name: Build and Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        # macOS 使用 macos-latest (Apple Silicon)
        # Windows 使用 windows-latest
        # Linux 使用 ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以计算版本号

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Verify Wails installation
        run: wails3 doctor

      - name: Update build assets
        run: wails3 task common:update:build-assets
        if: runner.os == 'macOS'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          # 确保有 zip 命令
          which zip || brew install zip

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install NSIS (Nullsoft Scriptable Install System)
          Write-Host "Installing NSIS..."
          choco install nsis --no-progress -y
          
          # Refresh environment variables using multiple methods
          Write-Host "Refreshing environment variables..."
          
          # Method 1: Try refreshenv (Chocolatey helper)
          if (Get-Command refreshenv -ErrorAction SilentlyContinue) {
            refreshenv
            Write-Host "Used refreshenv to update environment"
          }
          
          # Method 2: Manually refresh PATH from registry
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "Manually refreshed PATH from registry"
          
          # Method 3: Add NSIS path directly if still not found
          $nsisPaths = @(
            "C:\Program Files (x86)\NSIS",
            "C:\Program Files\NSIS",
            "$env:ProgramFiles\NSIS",
            "${env:ProgramFiles(x86)}\NSIS"
          )
          
          foreach ($path in $nsisPaths) {
            if (Test-Path $path) {
              if ($env:Path -notlike "*$path*") {
                $env:Path += ";$path"
                Write-Host "Added NSIS path: $path"
              }
              break
            }
          }
          
          # Verify NSIS installation
          Write-Host "Checking for makensis..."
          $makensisCmd = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensisCmd) {
            Write-Host "Found makensis at: $($makensisCmd.Source)"
            & makensis /VERSION
            Write-Host "NSIS installed and verified successfully"
          } else {
            Write-Host "ERROR: makensis not found in PATH"
            Write-Host "Current PATH: $env:Path"
            Write-Host "Searching for makensis.exe..."
            Get-ChildItem -Path "C:\Program Files*" -Filter "makensis.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 5 FullName
            exit 1
          }
          
          Write-Host "Windows environment ready"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          
          # Try to install packages, handle different Ubuntu versions
          echo "Installing GTK3 and WebKit2GTK development libraries..."
          sudo apt-get install -y \
            libgtk-3-dev \
            libasound2-dev \
            zip \
            pkg-config || true
          
          # Try webkit2gtk-4.1 first (newer), fall back to 4.0 (older)
          if ! dpkg -l | grep -q libwebkit2gtk-4.1-dev; then
            echo "Trying to install libwebkit2gtk-4.1-dev..."
            sudo apt-get install -y libwebkit2gtk-4.1-dev || {
              echo "libwebkit2gtk-4.1-dev not found, trying libwebkit2gtk-4.0-dev..."
              sudo apt-get install -y libwebkit2gtk-4.0-dev || {
                echo "ERROR: Neither webkit2gtk-4.1 nor 4.0 dev packages found"
                exit 1
              }
            }
          fi
          
          # Configure PKG_CONFIG_PATH for proper library detection
          export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV
          
          # List available gtk and webkit packages for debugging
          echo "=== Available GTK packages ==="
          dpkg -l | grep gtk || true
          echo "=== Available WebKit packages ==="
          dpkg -l | grep webkit || true
          
          # Verify package installation
          echo "=== Checking pkg-config ==="
          pkg-config --list-all | grep -i gtk || true
          pkg-config --list-all | grep -i webkit || true
          
          echo "Linux dependencies installed and configured"

      - name: Build and Package (macos)
        if: runner.os == 'macOS'
        run: |
          echo "Starting package-all task..."
          task package-macos
        env:
          CGO_ENABLED: 0

      - name: Build and Package (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Starting package-all task..."
          task package-windows
        env:
          CGO_ENABLED: 0

      - name: Build and Package (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Starting package-linux task..."
          task package-linux
        env:
          CGO_ENABLED: 1

      - name: List built artifacts
        run: |
          echo "=== Built Artifacts ==="
          ls -lah bin/releases/ || dir bin\releases\
        shell: bash

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/releases/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (manual trigger)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: ${{ matrix.os }}-artifacts
          path: bin/releases/
          retention-days: 30
