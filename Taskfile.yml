version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "haoyun-music-player"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"
  _APP_NAME: "haoyun-music-player"
  VERSION_1: "0"
  VERSION_2: "0"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  # build-all:
  #   desc: "Build for all platforms"
  #   cmds:
  #     - wails3 task windows:package # 生成 .exe 或 .msi
  #     # - CGO_ENABLED=1 CGO_CFLAGS="-fno-sanitize=undefined" wails3 task windows:package # 生成 .exe 或 .msi
  #     # - CGO_ENABLED=1 CGO_CFLAGS="-fsanitize=undefined -fsanitize-trap=undefined" wails3 linux:package
  #     - wails3 task darwin:package # 生成 .app
  #     - wails3 task darwin:package:universal #  universal
  #     # - wails3 task linux:package # 生成 .deb 或 .AppImage

  package-pre:
    summary: Package the application with version and timestamp
    cmds:
      - echo "开始打包应用..."
      - |
        mkdir -p ./bin/releases
        cd ./bin

        cp ../"LICENSE" ./

        cat > install << EOF
        #!/bin/bash
        # 清除 macOS 隔离属性（避免 Gatekeeper 警告）
        if [ -d "{{._APP_NAME}}.app" ]; then
            echo "清除隔离属性..."
            xattr -r -d com.apple.quarantine /Applications/"{{._APP_NAME}}.app" 2>/dev/null || true
        fi
        EOF


        _VERSION=$(git describe --tags --abbrev=0)
        # 创建说明文件
        cat > README.md << EOF
        # {{._APP_NAME}} ${_VERSION}

        ## 安装说明

        1. 解压此压缩包
        2. 将 `{{._APP_NAME}}.app` 拖拽到 Applications 文件夹
        3. 首次运行时，如果提示"无法验证开发者"，请：
          - 右键点击应用 → 打开
          - 或者在系统偏好设置 → 安全性与隐私中允许运行

        ## 系统要求

        - macOS 10.15 或更高版本
        - Apple Silicon (ARM64) 或 Intel (AMD64) 处理器

        ## 功能特性

        - 🎵 本地音乐播放
        - 📝 歌词显示
        - 🎨 专辑封面展示
        - ⌨️ 键盘快捷键支持
        - 🔊 媒体键控制

        ## 常见问题

        **Q: 应用无法打开？**
        A: 请在终端执行：\`xattr -rd com.apple.quarantine /Applications/{{._APP_NAME}}.app\`

        **Q: 音频格式不支持？**
        A: 请确保已安装 FFmpeg：\`brew install ffmpeg\`

        ## 技术支持

        如有问题请访问项目主页或提交 Issue。
        EOF
        cd ..

  package-post:
    summary: Package the application with version and timestamp
    cmds:
      - echo "开始打包应用..."
      - |
        mkdir -p ./bin
        cd ./bin
        # 清理临时文件
        rm -f README.md install
        rm -rf "./releases/tmp_dmg"

  package-all:
    summary: Package the application with version and timestamp 在macos生成windows和macos安装包
    cmds:
      - echo "开始打包应用..."
      - task package-macos
      - task package-win-macos

  package-win-macos:
    summary: Package the application with version and timestamp 在macos生成windows安装包
    cmds:
      - |
        # 获取版本号
        VERSION_3=$(git rev-list HEAD --no-merges  --count)
        # _VERSION=v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}
        _VERSION=$(git describe --tags --abbrev=0)

        # 获取当前时间戳 %Y%m%d_%H%M%S
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")

        rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        task windows:package
        # Windows 打包 arm64
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Windows_arm64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-arm64-installer.exe"
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
        task windows:package
        # Windows 打包 arm64
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Windows_amd64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-amd64-installer.exe"
        echo "打包完成: releases/${PACKAGE_NAME}"

        # Windows 打包 universal
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Windows_universal.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-amd64-installer.exe" "{{._APP_NAME}}-arm64-installer.exe"
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

  package-macos:
    summary: Package the application with version and timestamp for macOS
    cmds:
      - echo "开始打包应用..."
      - |
        # 获取版本号
        VERSION_3=$(git rev-list HEAD --no-merges  --count)
        # _VERSION=v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}
        _VERSION=$(git describe --tags --abbrev=0)

        # 获取当前时间戳 %Y%m%d_%H%M%S
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        # 创建打包目录
        rm -rf ./bin/releases
        mkdir -p ./bin/releases
        task package-pre

        rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        task darwin:package
        # macOS 打包
        cd ./bin

        # PACKAGE_NAME_ZIP="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_macOS_arm64.zip"
        PACKAGE_NAME_DMG="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_macOS_arm64.dmg"

        # 创建临时目录用于 DMG 打包
        mkdir -p "./releases/tmp_dmg"
        cp -R "{{._APP_NAME}}.app" "./releases/tmp_dmg/"
        cp "README.md" "./releases/tmp_dmg/"
        cp "LICENSE" "./releases/tmp_dmg/"
        cp "install" "./releases/tmp_dmg/"

        # 创建 Applications 文件夹快捷方式（方便用户拖拽安装）
        ln -s /Applications "./releases/tmp_dmg/Applications"

        # # 打包 ZIP
        # zip -r "./releases/${PACKAGE_NAME_ZIP}" "{{._APP_NAME}}.app" "README.md" "LICENSE" "install"
        # echo "ZIP 打包完成: releases/${PACKAGE_NAME_ZIP}"

        # 打包 DMG
        hdiutil create -volname "{{._APP_NAME}}" \
          -srcfolder "./releases/tmp_dmg" \
          -ov -format UDZO \
          "./releases/${PACKAGE_NAME_DMG}"
        echo "DMG 打包完成: releases/${PACKAGE_NAME_DMG}"

        # 清理临时文件
        rm -rf "./releases/tmp_dmg"
        cd ..
        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
        task darwin:package
        # macOS 打包
        cd ./bin
        # PACKAGE_NAME_ZIP="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_macOS_amd64.zip"
        PACKAGE_NAME_DMG="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_macOS_amd64.dmg"

        # 创建临时目录用于 DMG 打包
        mkdir -p "./releases/tmp_dmg"
        cp -R "{{._APP_NAME}}.app" "./releases/tmp_dmg/"
        cp "README.md" "./releases/tmp_dmg/"
        cp "LICENSE" "./releases/tmp_dmg/"
        cp "install" "./releases/tmp_dmg/"

        # 创建 Applications 文件夹快捷方式
        ln -s /Applications "./releases/tmp_dmg/Applications"

        # # 打包 ZIP
        # zip -r "./releases/${PACKAGE_NAME_ZIP}" "{{._APP_NAME}}.app" "README.md" "LICENSE" "install"
        # echo "ZIP 打包完成: releases/${PACKAGE_NAME_ZIP}"

        # 打包 DMG
        hdiutil create -volname "{{._APP_NAME}}" \
          -srcfolder "./releases/tmp_dmg" \
          -ov -format UDZO \
          "./releases/${PACKAGE_NAME_DMG}"
        echo "DMG 打包完成: releases/${PACKAGE_NAME_DMG}"

        # 清理临时文件
        rm -rf "./releases/tmp_dmg"
        cd ..
        rm -f ./bin/{{._APP_NAME}}
        task darwin:package:universal
        # macOS 打包universal
        cd ./bin
        PACKAGE_NAME_ZIP="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_macOS_universal.zip"
        PACKAGE_NAME_DMG="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_macOS_universal.dmg"

        # 创建临时目录用于 DMG 打包
        mkdir -p "./releases/tmp_dmg"
        cp -R "{{._APP_NAME}}.app" "./releases/tmp_dmg/"
        cp "README.md" "./releases/tmp_dmg/"
        cp "LICENSE" "./releases/tmp_dmg/"
        cp "install" "./releases/tmp_dmg/"

        # 创建 Applications 文件夹快捷方式
        ln -s /Applications "./releases/tmp_dmg/Applications"

        # 打包 ZIP
        zip -r "./releases/${PACKAGE_NAME_ZIP}" "{{._APP_NAME}}.app" "README.md" "LICENSE" "install"
        echo "ZIP 打包完成: releases/${PACKAGE_NAME_ZIP}"

        # 打包 DMG
        hdiutil create -volname "{{._APP_NAME}}" \
          -srcfolder "./releases/tmp_dmg" \
          -ov -format UDZO \
          "./releases/${PACKAGE_NAME_DMG}"
        echo "DMG 打包完成: releases/${PACKAGE_NAME_DMG}"
        cd ..
      - task package-post

  package-windows:
    summary: Package the application with version and timestamp for Windows
    cmds:
      - echo "开始打包应用..."
      - |
        cp ../"LICENSE" ./
        # 获取版本号
        VERSION_3=$(git rev-list HEAD --no-merges  --count)
        # _VERSION=v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}
        _VERSION=$(git describe --tags --abbrev=0)

        # 获取当前时间戳 %Y%m%d_%H%M%S
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        # 创建打包目录
        rm -rf ./bin/releases
        mkdir -p ./bin/releases
        task package-pre

        rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        task windows:package
        # Windows 打包 arm64
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Windows_arm64.zip"
        powershell Compress-Archive -Path '{{._APP_NAME}}-arm64-installer.exe', 'LICENSE' -DestinationPath './releases/${PACKAGE_NAME}' -Force
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ../


        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
        task windows:package
        # Windows 打包 amd64
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Windows_amd64.zip"
        powershell Compress-Archive -Path '{{._APP_NAME}}-amd64-installer.exe', 'LICENSE' -DestinationPath './releases/${PACKAGE_NAME}' -Force
        echo "打包完成: releases/${PACKAGE_NAME}"

        # Windows 打包 universal (需要先确保两个文件都存在)
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Windows_universal.zip"
        powershell Compress-Archive -Path '{{._APP_NAME}}-arm64-installer.exe', '{{._APP_NAME}}-amd64-installer.exe', 'LICENSE' -DestinationPath './releases/${PACKAGE_NAME}' -Force
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

      - task package-post

  package-linux:
    summary: Package the application with version and timestamp for Linux
    cmds:
      - echo "开始打包应用..."
      - |
        cp ../"LICENSE" ./
        # 获取版本号
        VERSION_3=$(git rev-list HEAD --no-merges  --count)
        # _VERSION=v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}
        _VERSION=$(git describe --tags --abbrev=0)

        # 获取当前时间戳 %Y%m%d_%H%M%S
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        # 创建打包目录
        rm -rf ./bin/releases
        mkdir -p ./bin/releases
        task package-pre

        # rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        task linux:package
        # Linux 打包
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Linux_arm64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}" "LICENSE"
        echo "打包完成: releases/${PACKAGE_NAME}"

        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
        task linux:package
        # Linux 打包
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_${_VERSION}_${TIMESTAMP}_Linux_amd64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}"  "LICENSE"
        echo "打包完成: releases/${PACKAGE_NAME}"

      - task package-post
