version: "3"

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "haoyun-music-player"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"
  _APP_NAME: "haoyun-music-player"
  VERSION_1: "0"
  VERSION_2: "0"

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  # build-all:
  #   desc: "Build for all platforms"
  #   cmds:
  #     - wails3 task windows:package # 生成 .exe 或 .msi
  #     # - CGO_ENABLED=1 CGO_CFLAGS="-fno-sanitize=undefined" wails3 task windows:package # 生成 .exe 或 .msi
  #     # - CGO_ENABLED=1 CGO_CFLAGS="-fsanitize=undefined -fsanitize-trap=undefined" wails3 linux:package
  #     - wails3 task darwin:package # 生成 .app
  #     - wails3 task darwin:package:universal #  universal
  #     # - wails3 task linux:package # 生成 .deb 或 .AppImage

  package-all:
    summary: Package the application with version and timestamp
    cmds:
      - echo "开始打包应用..."
      - |
        # 获取版本号
        VERSION_3=$(git rev-list HEAD --no-merges  --count)
        # 获取当前时间戳 %Y%m%d_%H%M%S
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        # 创建打包目录
        rm -rf ./bin/releases
        mkdir -p ./bin/releases

        rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        task darwin:package
        # macOS 打包
        cd ./bin


        cat > install << EOF
        #!/bin/bash
        # 清除 macOS 隔离属性（避免 Gatekeeper 警告）
        if [ -d "{{._APP_NAME}}.app" ]; then
            echo "清除隔离属性..."
            xattr -r -d com.apple.quarantine /Applications/"{{._APP_NAME}}.app" 2>/dev/null || true
        fi
        EOF

        # 创建说明文件
        cat > README.md << EOF
        # {{._APP_NAME}} v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}

        ## 安装说明

        1. 解压此压缩包
        2. 将 `{{._APP_NAME}}.app` 拖拽到 Applications 文件夹
        3. 首次运行时，如果提示"无法验证开发者"，请：
          - 右键点击应用 → 打开
          - 或者在系统偏好设置 → 安全性与隐私中允许运行

        ## 系统要求

        - macOS 10.15 或更高版本
        - Apple Silicon (ARM64) 或 Intel (AMD64) 处理器

        ## 功能特性

        - 🎵 本地音乐播放
        - 📝 歌词显示
        - 🎨 专辑封面展示
        - ⌨️ 键盘快捷键支持
        - 🔊 媒体键控制

        ## 常见问题

        **Q: 应用无法打开？**
        A: 请在终端执行：\`xattr -rd com.apple.quarantine /Applications/{{._APP_NAME}}.app\`

        **Q: 音频格式不支持？**
        A: 请确保已安装 FFmpeg：\`brew install ffmpeg\`

        ## 技术支持

        如有问题请访问项目主页或提交 Issue。
        EOF

        PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_macOS_arm64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}.app" "README.md" "LICENSE" "install"
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
        task darwin:package
        # macOS 打包
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_macOS_amd64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}.app" "README.md" "LICENSE" "install"
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

        rm -f ./bin/{{._APP_NAME}}
        task darwin:package:universal 
        # macOS 打包universal
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_macOS_universal.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}.app" "README.md" "LICENSE" "install"
        echo "打包完成: releases/${PACKAGE_NAME}"

        # 清理临时文件
        rm -f README.md install
        cd ..

        rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        task windows:package
        # Windows 打包 arm64
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_Windows_arm64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-arm64-installer.exe"
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
        task windows:package
        # Windows 打包 arm64
        cd ./bin
        PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_Windows_amd64.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-amd64-installer.exe"
        echo "打包完成: releases/${PACKAGE_NAME}"

        # Windows 打包 universal
        PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_Windows_universal.zip"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-arm64-installer.exe"
        zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}-arm64-installer.exe"
        echo "打包完成: releases/${PACKAGE_NAME}"
        cd ..

        # rm -f ./bin/{{._APP_NAME}}
        ARCH=arm64
        # task linux:package
        # # Linux 打包
        # cd ./bin
        # PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_Linux_arm64.zip"
        # zip -r "./releases/${PACKAGE_NAME}" "{{._APP_NAME}}"
        # echo "打包完成: releases/${PACKAGE_NAME}"

        rm -f ./bin/{{._APP_NAME}}
        ARCH=amd64
