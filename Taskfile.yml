        # # Linux 打包
        # cd ./bin
        # PACKAGE_NAME="{{._APP_NAME}}_v{{.VERSION_1}}.{{.VERSION_2}}.${VERSION_3}_${TIMESTAMP}_Linux_amd64.zip"
